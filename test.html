<!DOCTYPE html>
<html>
<head>
  <title>Example</title>
</head>
<body>
  <script>
    fetch("http://localhost:8080/shops")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Request failed with status: " + response.status);
        }
        return response.json();
      })
      .then((data) => {
        console.log(data.shops);
      })
      .catch((error) => {
        console.error(error);
      });
  </script>
</body>
</html>
